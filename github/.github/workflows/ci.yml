name: CI — CoRoute API

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Build & Tests ──────────────────────────────────────────────────────
  build:
    name: Build & Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: 🔨 Build
        run: mvn compile -q

      - name: 🧪 Tests unitaires
        run: mvn test -Dtest="*Test" --no-transfer-progress

      - name: 🧪 Tests d'intégration
        run: mvn test -Dtest="*IT" --no-transfer-progress

      - name: 🐳 Tests Testcontainers (MongoDB)
        run: mvn test -Dtest="InMongo*" --no-transfer-progress

      - name: 📦 Package
        run: mvn package -DskipTests -q

      - name: 📊 Upload rapport de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: target/surefire-reports/

  # ── Docker Build ───────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: 📦 Package JAR
        run: mvn package -DskipTests -q

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🚀 Build & Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/coroute-api:latest
            ${{ secrets.DOCKER_USERNAME }}/coroute-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
